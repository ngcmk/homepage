<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon with code brackets -->
  <g>
    <!-- Purple Hexagon -->
    <path d="M 80 60 L 160 120 L 160 240 L 80 300 L 0 240 L 0 120 Z" 
          fill="none" stroke="#5D3FD3" stroke-width="16" stroke-linejoin="round"/>
    
    <!-- Left bracket < (Purple) -->
    <path d="M 40 170 L 20 210 L 40 250" 
          fill="none" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Middle slash / (Blue) -->
    <line x1="80" y1="160" x2="80" y2="260" 
          stroke="#0EA5E9" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Right bracket > (Blue) -->
    <path d="M 120 170 L 140 210 L 120 250" 
          fill="none" stroke="#0EA5E9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- NGC Text -->
  <text x="220" y="150" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#001F3F" letter-spacing="8">NGC</text>
  
  <!-- NEXT GENERATION CODE Text -->
  <text x="220" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0EA5E9" letter-spacing="2">NEXT GENERATION</text>
  <text x="220" y="260" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0EA5E9" letter-spacing="2">CODE</text>
</svg>