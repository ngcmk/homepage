<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .hexagon-stroke { stroke: #8B5CF6; }
        .code-left { stroke: #7C3AED; }
        .code-middle { stroke: #0EA5E9; }
        .code-right { stroke: #0EA5E9; }
      }
      @media (prefers-color-scheme: light) {
        .hexagon-stroke { stroke: #6D28D9; }
        .code-left { stroke: #7C3AED; }
        .code-middle { stroke: #0EA5E9; }
        .code-right { stroke: #0EA5E9; }
      }
    </style>
  </defs>
  
  <!-- Hexagon -->
  <path class="hexagon-stroke" d="M 100 30 L 160 65 L 160 135 L 100 170 L 40 135 L 40 65 Z" 
        fill="none" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Left bracket < -->
  <path class="code-left" d="M 70 95 L 55 115 L 70 135" 
        fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Middle vertical line | -->
  <path class="code-middle" d="M 100 95 L 100 135" 
        fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right bracket > -->
  <path class="code-right" d="M 130 95 L 145 115 L 130 135" 
        fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
  <polygon class="hexagon" points="256,80 380,160 380,320 256,400 132,320 132,160"/>
  
  <!-- Code symbol: < / > -->
  <g transform="translate(256, 240)">
    <!-- Left bracket < -->
    <path class="bracket" d="M -50 -50 L -20 0 L -50 50"/>
    
    <!-- Forward slash / -->
    <line class="bracket" x1="5" y1="-50" x2="35" y2="50"/>
    
    <!-- Right bracket > -->
    <path class="bracket" d="M 50 -50 L 80 0 L 50 50"/>
  </g>
</svg>