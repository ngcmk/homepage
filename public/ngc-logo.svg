<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hexagon { fill: url(#purpleGradient); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
      .bracket { stroke: url(#blueGradient); stroke-width: 20; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#A855F7" />
      <stop offset="100%" stopColor="#7C3AED" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#3B82F6" />
      <stop offset="100%" stopColor="#1E40AF" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Hexagon -->
  <polygon class="hexagon" points="256,80 380,160 380,320 256,400 132,320 132,160"/>
  
  <!-- Code symbol: < / > -->
  <g transform="translate(256, 240)">
    <!-- Left bracket < -->
    <path class="bracket" d="M -50 -50 L -20 0 L -50 50"/>
    
    <!-- Forward slash / -->
    <line class="bracket" x1="5" y1="-50" x2="35" y2="50"/>
    
    <!-- Right bracket > -->
    <path class="bracket" d="M 50 -50 L 80 0 L 50 50"/>
  </g>
</svg>